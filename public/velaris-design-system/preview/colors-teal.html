<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Teal scale (primary)" subtitle="Velaris teal 1–10, terminating in brand navy" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-tertiary); }
  .sw { flex: 1; height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; box-sizing: border-box; }
  .sw .n { font-size: 11px; font-weight: 600; letter-spacing: .02em; }
  .sw .h { font-size: 9.5px; font-family: var(--font-mono); opacity: .85; }
  .legend { margin-top: 12px; display: flex; gap: 18px; font-size: 11.5px; color: var(--text-secondary); }
  .legend b { color: var(--text-primary); font-weight: 600; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:var(--teal-1);color:#1a2940"><span class="n">teal/1</span><span class="h">#E9F6F6</span></div>
    <div class="sw" style="background:var(--teal-2);color:#1a2940"><span class="n">2</span><span class="h">#C5E8E9</span></div>
    <div class="sw" style="background:var(--teal-3);color:#1a2940"><span class="n">3</span><span class="h">#9BD7D9</span></div>
    <div class="sw" style="background:var(--teal-4);color:#0f424a"><span class="n">4</span><span class="h">#6AC1C4</span></div>
    <div class="sw" style="background:var(--teal-5);color:#fff"><span class="n">5</span><span class="h">#41A8AC</span></div>
    <div class="sw" style="background:var(--teal-6);color:#fff"><span class="n">6 ◆</span><span class="h">#2A8F94</span></div>
    <div class="sw" style="background:var(--teal-7);color:#fff"><span class="n">7</span><span class="h">#1E7378</span></div>
    <div class="sw" style="background:var(--teal-8);color:#fff"><span class="n">8</span><span class="h">#155A60</span></div>
    <div class="sw" style="background:var(--teal-9);color:#fff"><span class="n">9</span><span class="h">#0F424A</span></div>
    <div class="sw" style="background:var(--teal-10);color:#fff"><span class="n">10</span><span class="h">#1A2940</span></div>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:var(--teal-6)"></span><b>teal/6</b> — Velaris primary</span>
    <span><span class="dot" style="background:var(--teal-10)"></span><b>teal/10</b> — brand navy</span>
    <span>Replaces Ant blue #1677FF</span>
  </div>
</div>
</body>
</html>
