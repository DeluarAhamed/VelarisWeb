<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Brand gradient" subtitle="Logo teal→navy gradient and brand stops" viewport="700x165" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; display:flex; gap: 16px; }
  .grad { flex: 1.4; height: 120px; border-radius: var(--radius-lg); background: var(--brand-gradient); position: relative; box-shadow: var(--shadow); }
  .grad .label { position:absolute; left:14px; bottom:12px; color:#fff; }
  .grad .label b { display:block; font-size:13px; font-weight:600; }
  .grad .label span { font-size:11px; font-family: var(--font-mono); opacity:.85; }
  .stops { flex: 1; display:flex; flex-direction:column; gap:8px; }
  .stop { display:flex; align-items:center; gap:10px; font-size:11.5px; }
  .stop .c { width:30px; height:30px; border-radius: var(--radius-sm); border:1px solid var(--border-secondary); }
  .stop .t b { display:block; }
  .stop .t span { font-family: var(--font-mono); color: var(--text-tertiary); font-size:10.5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="grad">
    <div class="label"><b>Brand gradient</b><span>155° · #34979C → #277E84 → #1A2940</span></div>
  </div>
  <div class="stops">
    <div class="stop"><div class="c" style="background:#34979C"></div><div class="t"><b>Brand teal</b><span>#34979C</span></div></div>
    <div class="stop"><div class="c" style="background:#2A8F94"></div><div class="t"><b>Primary</b><span>#2A8F94</span></div></div>
    <div class="stop"><div class="c" style="background:#1A2940"></div><div class="t"><b>Brand navy</b><span>#1A2940</span></div></div>
  </div>
</div>
</body>
</html>
