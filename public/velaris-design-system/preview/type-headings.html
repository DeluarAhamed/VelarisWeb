<!DOCTYPE html>
<!-- @dsCard group="Type" name="Headings" subtitle="H1–H5, system sans, 600 weight" viewport="700x235" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-secondary); }
  .line:last-child { border-bottom: 0; }
  .spec { width: 96px; flex: none; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); }
  .samp { font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="spec">H1 · 38/46</span><span class="samp" style="font-size:38px;line-height:46px">Heading one</span></div>
  <div class="line"><span class="spec">H2 · 30/38</span><span class="samp" style="font-size:30px;line-height:38px">Heading two</span></div>
  <div class="line"><span class="spec">H3 · 24/32</span><span class="samp" style="font-size:24px;line-height:32px">Heading three</span></div>
  <div class="line"><span class="spec">H4 · 20/28</span><span class="samp" style="font-size:20px;line-height:28px">Heading four</span></div>
  <div class="line"><span class="spec">H5 · 16/24</span><span class="samp" style="font-size:16px;line-height:24px">Heading five</span></div>
</div>
</body>
</html>
