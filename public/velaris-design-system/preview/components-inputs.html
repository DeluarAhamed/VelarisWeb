<!DOCTYPE html>
<!-- @dsCard group="Components" name="Inputs" subtitle="Default, focus, with icon, error" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field label { display:block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .inp { height: 32px; border: 1px solid var(--border); border-radius: var(--radius); display:flex; align-items:center; padding: 0 11px; gap: 8px; background:#fff; }
  .inp.focus { border-color: var(--teal-6); box-shadow: 0 0 0 2px rgba(42,143,148,0.12); }
  .inp.err { border-color: var(--color-error); box-shadow: 0 0 0 2px rgba(255,77,79,0.1); }
  .inp input { border:0; outline:0; font-family: var(--font-ui); font-size: 14px; flex:1; color: var(--text-primary); background:transparent; }
  .inp input::placeholder { color: var(--text-tertiary); }
  .vi { width: 15px; height: 15px; display:inline-block; color: var(--text-tertiary); flex:none; }
  .hint { font-size: 11.5px; margin-top: 5px; }
  .hint.e { color: var(--color-error); }
</style>
</head>
<body>
<div class="wrap">
  <div class="field">
    <label>Default</label>
    <div class="inp"><input placeholder="you@company.com"></div>
  </div>
  <div class="field">
    <label>Focused</label>
    <div class="inp focus"><span class="vi" data-icon="search" style="color:var(--teal-6)"></span><input value="Velaris"></div>
  </div>
  <div class="field">
    <label>With icon</label>
    <div class="inp"><span class="vi" data-icon="user"></span><input placeholder="Username"></div>
  </div>
  <div class="field">
    <label>Error</label>
    <div class="inp err"><input value="not-an-email"></div>
    <div class="hint e">Enter a valid email address.</div>
  </div>
</div>
<script>window.ICON_BASE='../assets/icons';</script>
<script src="../assets/icons.js"></script>
</body>
</html>
