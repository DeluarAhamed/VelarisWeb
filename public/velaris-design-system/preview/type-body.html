<!DOCTYPE html>
<!-- @dsCard group="Type" name="Body & inline" subtitle="LG / Base / SM with inline styles" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; }
  .line { display:flex; align-items:baseline; gap:16px; padding: 7px 0; border-bottom: 1px solid var(--border-secondary); }
  .line:last-child { border-bottom:0; }
  .spec { width: 96px; flex:none; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); }
  p { margin: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="spec">LG · 16/24</span><p style="font-size:16px;line-height:24px;color:var(--text-primary)">Large body — used for leads and emphasis.</p></div>
  <div class="line"><span class="spec">Base · 14/22</span><p style="font-size:14px;line-height:22px;color:var(--text-primary)">Default UI &amp; body text. <strong style="font-weight:600">Strong</strong>, <a href="#" class="v-link">a link</a>, <span style="text-decoration:underline">underline</span>, <span style="text-decoration:line-through;color:var(--text-tertiary)">delete</span>.</p></div>
  <div class="line"><span class="spec">SM · 12/20</span><p style="font-size:12px;line-height:20px;color:var(--text-secondary)">Small — captions, helper text, table meta.</p></div>
</div>
</body>
</html>
