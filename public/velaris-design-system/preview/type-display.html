<!DOCTYPE html>
<!-- @dsCard group="Type" name="Display type" subtitle="Playfair Display — marketing & wordmark feel" viewport="700x120" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 24px; }
  .disp { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: 1.05; letter-spacing: -.01em; color: var(--text-primary); }
  .disp em { font-style: italic; color: var(--teal-7); }
  .meta { margin-top: 14px; font-size: 11.5px; color: var(--text-tertiary); font-family: var(--font-mono); }
  .meta b { color: var(--text-secondary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="disp">Build, ship &amp; <em>scale</em></div>
  <div class="meta"><b>Zodiak</b> · Bold/Extrabold + Italic · 56/64 · brand display &amp; marketing serif</div>
</div>
</body>
</html>
