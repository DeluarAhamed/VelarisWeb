<!DOCTYPE html>
<!-- @dsCard group="Components" name="Cards" subtitle="Stat & deployment cards with chrome" viewport="700x295" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--bg-layout); }
  .wrap { width: 700px; box-sizing: border-box; padding: 24px; display:flex; gap: 18px; }
  .card { flex:1; background:#fff; border-radius: var(--radius-lg); border: 1px solid var(--border-secondary); box-shadow: var(--shadow-tertiary); overflow:hidden; }
  .card .head { padding: 14px 16px; border-bottom: 1px solid var(--border-secondary); display:flex; align-items:center; justify-content:space-between; }
  .card .head h3 { font-size: 15px; font-weight: 600; margin:0; color: var(--text-primary); }
  .vi { width: 16px; height:16px; display:inline-block; color: var(--text-tertiary); }
  .card .body { padding: 16px; }
  .stat { font-family: var(--font-mono); font-size: 30px; font-weight: 700; color: var(--text-primary); letter-spacing: -.02em; }
  .delta { font-size: 12.5px; color: var(--color-success); font-weight: 600; margin-left: 8px; }
  .sub { font-size: 12.5px; color: var(--text-tertiary); margin-top: 4px; }
  .foot { padding: 11px 16px; border-top: 1px solid var(--border-secondary); display:flex; gap: 16px; }
  .link { color: var(--teal-6); font-size: 13px; font-weight: 500; }
  .bars { display:flex; align-items:flex-end; gap:5px; height:46px; margin-top:12px; }
  .bars div { flex:1; background: var(--teal-2); border-radius: 2px 2px 0 0; }
  .bars div.hi { background: var(--teal-6); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head"><h3>Active users</h3><span class="vi" data-icon="ellipsis"></span></div>
    <div class="body">
      <div><span class="stat">1,204</span><span class="delta">+12%</span></div>
      <div class="sub">vs. last 30 days</div>
      <div class="bars"><div style="height:40%"></div><div style="height:55%"></div><div style="height:35%"></div><div style="height:70%"></div><div style="height:50%"></div><div class="hi" style="height:90%"></div></div>
    </div>
    <div class="foot"><span class="link">View report →</span></div>
  </div>
  <div class="card">
    <div class="head"><h3>Deployment</h3><span class="vi" data-icon="rocket" style="color:var(--teal-6)"></span></div>
    <div class="body">
      <div class="stat" style="font-size:20px">production · v2.4.1</div>
      <div class="sub" style="margin-top:8px">Deployed 6 minutes ago · all checks passed</div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <span style="height:24px;padding:0 10px;border-radius:999px;background:var(--color-success-bg);color:var(--color-success-active);font-size:12px;display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;background:var(--color-success)"></span>Live</span>
        <span style="height:24px;padding:0 10px;border-radius:999px;background:var(--fill-tertiary);color:var(--text-secondary);font-size:12px;display:inline-flex;align-items:center">main</span>
      </div>
    </div>
    <div class="foot"><span class="link">Rollback</span><span class="link">Logs →</span></div>
  </div>
</div>
<script>window.ICON_BASE='../assets/icons';</script>
<script src="../assets/icons.js"></script>
</body>
</html>
