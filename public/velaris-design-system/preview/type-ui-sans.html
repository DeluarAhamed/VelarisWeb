<!DOCTYPE html>
<!-- @dsCard group="Type" name="UI sans (Cabinet Grotesk)" subtitle="Brand UI typeface — weights 300–800" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; }
  .big { font-size: 40px; font-weight: 800; letter-spacing: -.02em; color: var(--text-primary); line-height: 1; }
  .weights { display:flex; gap: 22px; margin-top: 16px; align-items:baseline; flex-wrap:wrap; }
  .weights span { font-size: 22px; color: var(--text-primary); }
  .meta { margin-top: 16px; font-size: 11.5px; color: var(--text-tertiary); }
  .meta b { color: var(--text-secondary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="big">Velaris ships to the web</div>
  <div class="weights">
    <span style="font-weight:300">Light</span>
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:700">Bold</span>
    <span style="font-weight:800">Extrabold</span>
  </div>
  <div class="meta"><b>Cabinet Grotesk</b> · UI typeface · 300 / 400 / 500 / 700 / 800 · used for all product text</div>
</div>
</body>
</html>
