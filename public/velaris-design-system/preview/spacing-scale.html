<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base grid, xxs→xxl" viewport="700x145" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: #fff; }
  .wrap { width: 700px; box-sizing: border-box; padding: 22px 24px; }
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .item { text-align:center; }
  .bar { background: var(--teal-3); border-radius: var(--radius-xs); }
  .item .v { margin-top: 7px; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); }
  .item .k { font-size: 10px; color: var(--text-tertiary); }
  .note { margin-top: 16px; font-size: 11.5px; color: var(--text-secondary); }
  .note b { color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="v">4</div><div class="k">xxs</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="v">8</div><div class="k">xs</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="v">12</div><div class="k">sm</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="v">16</div><div class="k">base</div></div>
    <div class="item"><div class="bar" style="width:20px;height:20px"></div><div class="v">20</div><div class="k">md</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="v">24</div><div class="k">lg</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="v">32</div><div class="k">xl</div></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="v">48</div><div class="k">xxl</div></div>
  </div>
  <div class="note"><b>4px base grid.</b> All padding, gaps, and offsets snap to these steps.</div>
</div>
</body>
</html>
